<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل خدمات بورتسودان</title>
    <!-- مكتبة تليجرام للتطبيقات المصغرة -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>🛠️ دليل خدمات بورتسودان</h2>
        <p>ربط طالبي الخدمات بمقدميها في جميع الأحياء</p>
    </header>

    <main class="container">
        
        <!-- أزرار التنقل -->
        <div class="nav-buttons">
            <button id="nav-search" class="nav-btn active">🔍 البحث عن خدمة</button>
            <button id="nav-add" class="nav-btn">➕ إضافة إعلان فني</button>
        </div>

        <!-- 1. قسم البحث -->
        <div id="search-section" class="card-box">
            <div class="form-group">
                <label for="category-select">القطاع / المجال:</label>
                <select id="category-select">
                    <option value="">جاري تحميل القطاعات...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="zone-select">المنطقة / الحي:</label>
                <select id="zone-select">
                    <option value="">جاري تحميل الأحياء...</option>
                </select>
            </div>

            <button id="search-btn" class="btn">🔍 عرض الفنيين المتاحين</button>
        </div>

        <!-- 2. قسم إضافة إعلان جديد -->
        <div id="add-section" class="card-box hidden">
            <h3>تسجيل إعلان فني جديد</h3>
            <div class="form-group">
                <label>اسم الفني / المهنة:</label>
                <input type="text" id="tech-title" placeholder="مثال: فني كهرباء منازل">
            </div>
            <div class="form-group">
                <label>المنطقة / الحي:</label>
                <select id="add-zone-select">
                    <option value="">جاري تحميل الأحياء...</option>
                </select>
            </div>
            <div class="form-group">
                <label>رقم الهاتف / الواتساب:</label>
                <input type="tel" id="tech-phone" placeholder="0912345678">
            </div>
            <div class="form-group">
                <label>تفاصيل الخدمة والخبرة:</label>
                <textarea id="tech-details" placeholder="اكتب الخبرة والخدمات المقدمة..."></textarea>
            </div>
            <button id="save-ad-btn" class="btn btn-success">✅ نشر الإعلان فوراً</button>
        </div>

        <!-- عرض كروت النتائج -->
        <div id="results" class="results-container">
            <p class="placeholder-text">جاري جلب الإعلانات المتاحة...</p>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
