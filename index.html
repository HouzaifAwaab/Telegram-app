<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل خدمات بورتسودان</title>
    <!-- مكتبة تليجرام للتطبيقات المصغرة -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- مكتبة Supabase لاتصال قاعدة البيانات -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h2>🛠️ دليل خدمات بورتسودان</h2>
        <p>ربط طالبي الخدمات بمقدميها في جميع الأحياء</p>
    </header>

    <main class="container">
        
        <!-- فلتر البحث -->
        <div class="filter-card">
            <div class="form-group">
                <label for="category-select">القطاع / المجال:</label>
                <select id="category-select">
                    <option value="">جاري تحميل القطاعات...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="job-select">المهنة المحددة:</label>
                <select id="job-select" disabled>
                    <option value="">اختر القطاع أولاً</option>
                </select>
            </div>

            <div class="form-group">
                <label for="zone-select">المنطقة / الحي:</label>
                <select id="zone-select">
                    <option value="">جاري تحميل الأحياء...</option>
                </select>
            </div>

            <button id="search-btn" class="btn">🔍 بحث عن فني</button>
        </div>

        <!-- عرض النتائج -->
        <div id="results" class="results-container">
            <p class="placeholder-text">حدد خيارات البحث واضغط على زر البحث للوصول للفنيين.</p>
        </div>

    </main>

    <script src="app.js"></script>
</body>
</html>
